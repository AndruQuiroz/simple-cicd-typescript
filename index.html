<body>
  <h1>Sum Two Int Numbers =) </h1>
  <input type="number" id="num1" placeholder="First number" />
  
  <select id="operator">
    <option value="add">+</option>
    <option value="subtract">-</option>
    <option value="multiply">x</option>
    <option value="divide">÷</option>
  </select>
  
  <input type="number" id="num2" placeholder="Second number" />
  <button type="button" id="btnSum">Calcular</button>
  <p>Result: <strong id="result">—</strong></p>

  <script src="sum.js"></script>
  <script>
    document.getElementById('btnSum').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      var operator = document.getElementById('operator').value;
      var resultElement = document.getElementById('result');

      try {
        if (operator === 'add') {
          resultElement.textContent = sum(a, b); 
        } else if (operator === 'subtract') {
          resultElement.textContent = window.subtract(a, b); 
        } else if (operator === 'multiply') {
          resultElement.textContent = window.multiply(a, b);
        } else if (operator === 'divide') {
          resultElement.textContent = window.divide(a, b);
        }
      } catch (error) {
        // Atrapamos el error si divide por cero y lo mostramos
        resultElement.textContent = "Error: " + error.message;
      }
    });
  </script>
</body>
